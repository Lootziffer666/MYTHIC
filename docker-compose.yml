services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - traefik
    restart: unless-stopped

  magic-deploy:
    build: .
    container_name: magic-deploy
    environment:
      - MAGIC_DEPLOY_BASE_DOMAIN=${MAGIC_DEPLOY_BASE_DOMAIN:-example.com}
      - MAGIC_DEPLOY_TRAEFIK_NETWORK=traefik
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "magic-deploy-data:/app/.deploy"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.magicdeploy.rule=Host(`deploy.${MAGIC_DEPLOY_BASE_DOMAIN:-example.com}`)"
      - "traefik.http.routers.magicdeploy.entrypoints=websecure"
      - "traefik.http.routers.magicdeploy.tls=true"
      - "traefik.http.routers.magicdeploy.tls.certresolver=letsencrypt"
      - "traefik.http.services.magicdeploy.loadbalancer.server.port=3000"
    networks:
      - traefik
    depends_on:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    name: traefik

volumes:
  traefik-certs:
  magic-deploy-data:
