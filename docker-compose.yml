services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - traefik
    restart: unless-stopped

  mythic:
    build: .
    container_name: mythic
    environment:
      - MYTHIC_BASE_DOMAIN=${MYTHIC_BASE_DOMAIN:-example.com}
      - NEXT_PUBLIC_MYTHIC_PUBLIC_IP=${MYTHIC_PUBLIC_IP:-}
      - MYTHIC_TRAEFIK_NETWORK=traefik
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "mythic-data:/app/.deploy"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mythic.rule=Host(`deploy.${MYTHIC_BASE_DOMAIN:-example.com}`)"
      - "traefik.http.routers.mythic.entrypoints=websecure"
      - "traefik.http.routers.mythic.tls=true"
      - "traefik.http.routers.mythic.tls.certresolver=letsencrypt"
      - "traefik.http.services.mythic.loadbalancer.server.port=3000"
    networks:
      - traefik
    depends_on:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    name: traefik

volumes:
  traefik-certs:
  mythic-data:
